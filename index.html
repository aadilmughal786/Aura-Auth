<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Auth - Privacy-First 2FA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/glass.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">Aura Auth</h1>
            <p class="tagline">Privacy-First TOTP Generator</p>
        </header>

        <div class="toolbar">
            <div class="search-bar">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search accounts...">
            </div>
            <button id="add-btn" class="add-btn-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <main class="main">
            <div id="accounts" class="accounts-list"></div>
        </main>

        <footer class="footer">
            <p>Secrets never leave your browser</p>
        </footer>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2>Add Account</h2>
            <div class="form-group">
                <label for="account-name">Account Name</label>
                <input type="text" id="account-name" placeholder="e.g., GitHub">
            </div>
            <div class="form-group">
                <label for="account-issuer">Issuer (optional)</label>
                <input type="text" id="account-issuer" placeholder="e.g., GitHub">
            </div>
            <div class="form-group">
                <label for="account-secret">Secret Key</label>
                <input type="text" id="account-secret" placeholder="Base32 encoded secret">
            </div>
            <div class="modal-actions">
                <button id="cancel-add" class="btn-secondary">Cancel</button>
                <button id="save-account" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal">
        <div class="modal-content delete-modal-content">
            <div class="delete-warning-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h2>Delete Account</h2>
            <p class="delete-message">Are you sure you want to delete <strong id="delete-account-name"></strong>?</p>
            <p class="delete-warning">This action cannot be undone. Your 2FA codes will be permanently removed.</p>
            <div class="modal-actions">
                <button id="cancel-delete" class="btn-secondary">Cancel</button>
                <button id="confirm-delete" class="btn-danger" disabled>Delete</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="modal">
        <div class="modal-content qr-modal-content">
            <h2>Account QR Code</h2>
            <div id="qr-code-container"></div>
            <p class="qr-instruction">Scan this with your authenticator app to transfer the account</p>
            <div class="modal-actions">
                <button id="close-qr" class="btn-primary">Close</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
